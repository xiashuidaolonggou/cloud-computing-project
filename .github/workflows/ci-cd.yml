# ==========================================================
# CI/CD Pipeline - 自动构建镜像 → 推送 SWR
# 云计算课程设计 附加题2
# ==========================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com

jobs:
  build-and-push:
    name: Build & Push to SWR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录华为云 SWR
        env:
          SWR_AK: ${{ secrets.SWR_AK }}
          SWR_SK: ${{ secrets.SWR_SK }}
        run: |
          echo "$SWR_SK" | docker login \
            -u "cn-north-4@$SWR_AK" \
            --password-stdin \
            "${{ env.SWR_REGISTRY }}"

      - name: 构建并推送 Backend
        run: |
          IMG="${{ env.SWR_REGISTRY }}/yxl2023112462/backend"
          docker build -t "$IMG:latest" -t "$IMG:${{ github.sha }}" ./backend
          docker push "$IMG" --all-tags

      - name: 构建并推送 Frontend
        run: |
          IMG="${{ env.SWR_REGISTRY }}/yxl2023112462/frontend"
          docker build -t "$IMG:latest" -t "$IMG:${{ github.sha }}" ./frontend
          docker push "$IMG" --all-tags
