# ==========================================================
# CI/CD Pipeline - 自动构建镜像 → 推送 SWR
# 云计算课程设计 附加题2
# ==========================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  BACKEND_IMG: swr.cn-north-4.myhuaweicloud.com/yxl2023112462/backend
  FRONTEND_IMG: swr.cn-north-4.myhuaweicloud.com/yxl2023112462/frontend

jobs:
  build-and-push:
    name: Build & Push to SWR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录华为云 SWR
        run: |
          echo "${{ secrets.SWR_SK }}" | docker login \
            -u cn-north-4@${{ secrets.SWR_AK }} \
            --password-stdin \
            ${{ env.SWR_REGISTRY }}

      - name: 构建并推送 Backend
        run: |
          docker build -t ${{ env.BACKEND_IMG }}:latest -t ${{ env.BACKEND_IMG }}:${{ github.sha }} ./backend
          docker push ${{ env.BACKEND_IMG }} --all-tags

      - name: 构建并推送 Frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMG }}:latest -t ${{ env.FRONTEND_IMG }}:${{ github.sha }} ./frontend
          docker push ${{ env.FRONTEND_IMG }} --all-tags
