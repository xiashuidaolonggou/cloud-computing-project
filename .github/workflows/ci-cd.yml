# ==========================================================
# CI/CD Pipeline - 自动构建镜像（因 SWR IP 限制，推送手动）
# 云计算课程设计 附加题2
# ==========================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 构建 Backend 镜像
        run: docker build -t backend:latest ./backend

      - name: 构建 Frontend 镜像
        run: docker build -t frontend:latest ./frontend

      - name: 验证镜像
        run: |
          echo "✅ 镜像构建成功！"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          echo ""
          echo "--- 准备推送至 SWR ---"
          echo "推送命令（CloudShell 中执行）："
          echo "  docker tag backend:latest swr.cn-north-4.myhuaweicloud.com/yxl2023112462/backend:latest"
          echo "  docker tag frontend:latest swr.cn-north-4.myhuaweicloud.com/yxl2023112462/frontend:latest"
          echo "  docker login -u cn-north-4@AK -p SK swr.cn-north-4.myhuaweicloud.com"
          echo "  docker push swr.cn-north-4.myhuaweicloud.com/yxl2023112462/backend --all-tags"
          echo "  docker push swr.cn-north-4.myhuaweicloud.com/yxl2023112462/frontend --all-tags"
