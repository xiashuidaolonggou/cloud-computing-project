# ── ConfigMap（非敏感配置）──────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  APP_ENV: "production"
---
# ── Secret（敏感配置，密码需 base64 编码）───────────────
# 编码命令：echo -n "your_password" | base64
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: default
type: Opaque
data:
  password: eW91cl9wYXNzd29yZA==  # base64("your_password")，请替换为你自己的密码
